<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>
  <!-- Orbital ring -->
  <ellipse cx="16" cy="16" rx="11" ry="5" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.9"/>
  <!-- Tilted orbital ring -->
  <ellipse cx="16" cy="16" rx="5" ry="11" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>
  <!-- Star at center -->
  <circle cx="16" cy="16" r="2.5" fill="#f0e6c8"/>
  <!-- Small orbiting dot -->
  <circle cx="27" cy="16" r="1.5" fill="#c9a84c"/>
</svg>
