<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0f"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c4922a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d0d0f"   stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left gradient wash -->
  <rect width="560" height="630" fill="url(#bgGrad)"/>

  <!-- Era accent bar — left edge -->
  <rect x="0" y="0" width="8" height="630" fill="#c4922a"/>

  <!-- Era badge — top left -->
  <rect x="28" y="28" width="159" height="34" rx="6" fill="#c4922a" fill-opacity="0.18"/>
  <rect x="28" y="28" width="159" height="34" rx="6"
    fill="none" stroke="#c4922a" stroke-width="1" stroke-opacity="0.6"/>
  <text x="40" y="51"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="14" font-weight="500"
    fill="#c4922a" letter-spacing="0.5">ERA 1 — ANCIENT</text>

  <!-- Site branding — top right -->
  <text x="1172" y="52" text-anchor="end"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="15" font-weight="400"
    fill="#ffffff" fill-opacity="0.35">HOW PHYSICS WORKS</text>

  <!-- Stop number — large background numeral -->
  <text x="80" y="248"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="180" font-weight="700"
    fill="#c4922a" fill-opacity="0.07"
    letter-spacing="-4">05</text>

  <!-- Stop number — small badge -->
  <text x="88" y="255"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="18" font-weight="400"
    fill="#c4922a" fill-opacity="0.7">Stop 05</text>

  <!-- Title lines -->
  <text x="88" y="285"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="72" font-weight="600"
      fill="#f0ede8" letter-spacing="-1">Archimedes and Buoyancy</text>

  <!-- Scientist name -->
  <text x="88" y="395"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="32" font-weight="400"
    fill="#c4922a">Archimedes</text>

  <!-- Horizontal rule -->
  <line x1="88" y1="423" x2="600" y2="423"
    stroke="#c4922a" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Description excerpt (first 90 chars) -->
  <text x="88" y="455"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="20" font-weight="300"
    fill="#ffffff" fill-opacity="0.45">Drag objects of different densities into water. The displaced volume equals the buoyant fo…</text>

  <!-- Year badge — bottom right -->
  <rect x="1040" y="560" width="144" height="44" rx="8"
    fill="#c4922a" fill-opacity="0.15"/>
  <rect x="1040" y="560" width="144" height="44" rx="8"
    fill="none" stroke="#c4922a" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="1168" y="588" text-anchor="end"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22" font-weight="600"
    fill="#c4922a">~250 BCE</text>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="#c4922a" fill-opacity="0.35"/>

</svg>