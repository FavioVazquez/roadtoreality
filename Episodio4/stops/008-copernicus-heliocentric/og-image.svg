<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0f"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4ca86b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d0d0f"   stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left gradient wash -->
  <rect width="560" height="630" fill="url(#bgGrad)"/>

  <!-- Era accent bar — left edge -->
  <rect x="0" y="0" width="8" height="630" fill="#4ca86b"/>

  <!-- Era badge — top left -->
  <rect x="28" y="28" width="285" height="34" rx="6" fill="#4ca86b" fill-opacity="0.18"/>
  <rect x="28" y="28" width="285" height="34" rx="6"
    fill="none" stroke="#4ca86b" stroke-width="1" stroke-opacity="0.6"/>
  <text x="40" y="51"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="14" font-weight="500"
    fill="#4ca86b" letter-spacing="0.5">ERA 2 — SCIENTIFIC REVOLUTION</text>

  <!-- Site branding — top right -->
  <text x="1172" y="52" text-anchor="end"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="15" font-weight="400"
    fill="#ffffff" fill-opacity="0.35">HOW PHYSICS WORKS</text>

  <!-- Stop number — large background numeral -->
  <text x="80" y="248"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="180" font-weight="700"
    fill="#4ca86b" fill-opacity="0.07"
    letter-spacing="-4">08</text>

  <!-- Stop number — small badge -->
  <text x="88" y="255"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="18" font-weight="400"
    fill="#4ca86b" fill-opacity="0.7">Stop 08</text>

  <!-- Title lines -->
  <text x="88" y="285"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="72" font-weight="600"
      fill="#f0ede8" letter-spacing="-1">Copernicus and the</text>
    <text x="88" y="371"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="72" font-weight="600"
      fill="#f0ede8" letter-spacing="-1">Heliocentric Model</text>

  <!-- Scientist name -->
  <text x="88" y="481"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="32" font-weight="400"
    fill="#4ca86b">Nicolaus Copernicus</text>

  <!-- Horizontal rule -->
  <line x1="88" y1="509" x2="600" y2="509"
    stroke="#4ca86b" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Description excerpt (first 90 chars) -->
  <text x="88" y="541"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="20" font-weight="300"
    fill="#ffffff" fill-opacity="0.45">Copernicus proposed the Sun, not the Earth, sits at the center. Toggle between models and …</text>

  <!-- Year badge — bottom right -->
  <rect x="1096" y="560" width="88" height="44" rx="8"
    fill="#4ca86b" fill-opacity="0.15"/>
  <rect x="1096" y="560" width="88" height="44" rx="8"
    fill="none" stroke="#4ca86b" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="1168" y="588" text-anchor="end"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22" font-weight="600"
    fill="#4ca86b">1543</text>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="#4ca86b" fill-opacity="0.35"/>

</svg>